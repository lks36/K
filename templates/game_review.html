<!DOCTYPE html>
<html>
<head>
    <title>Accueil</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="{{url_for('static', filename='game_review.css')}}">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>


<body>
    <div class="header">
        <a class="header_link" href="/">RETOUR À L'ACCUEIL</a>
    </div>
    <h1 class="title">Résumé de la partie</h1>
    <div class="review">
    
        
    <div class="chat">
        <div class="chat-box">
            <div id="message_holder">
                <ul id="message_ul" class="message_list"><li class="message">
                    
                    {% for message in messages %}
                        <div class="message_container" id=0>
                            <div class="message_container_head">
                                <img class="avatar" src="/static/avatars/{{message.author.avatar}}.jpg">
                                <p class="message"> Par {{message.author.nom}} (+{{message.score}} points), ce message a obtenu {{message.likes}} j'aime</p>
                            </div>
                            <p class="message">Contenu : "{{message.content}}"</p>
                        </div>
                    {% endfor %}
                    
                </li>
            </ul>
                    

            </div>
        </div>
    
    </div>
</div>
</body>



</html>
